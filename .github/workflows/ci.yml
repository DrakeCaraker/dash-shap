name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"  # nightly at 04:00 UTC
  workflow_dispatch:

jobs:
  freshness:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check if branch is up to date with main
        run: |
          git fetch origin main
          behind=$(git rev-list --count HEAD..origin/main)
          if [ "$behind" -gt 0 ]; then
            echo "::error::Branch is $behind commit(s) behind main. Rebase before merging: git fetch origin main && git rebase origin/main && git push --force-with-lease"
            exit 1
          else
            echo "Branch is up to date with main."
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff lint (auto-fix)
        run: ruff check --fix .
      - name: Ruff format (auto-fix)
        run: ruff format .
      - name: Commit fixes if any
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format via CI"
      - name: Ruff lint (verify)
        run: ruff check .
      - name: Ruff format (verify)
        run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
          pip install mypy
      - name: Run mypy
        run: mypy dash_shap/ --ignore-missing-imports --no-error-summary

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
          pip install pytest pytest-cov
      - name: Run tests with coverage
        run: pytest -v -m "not slow" --cov=dash_shap --cov-report=term-missing --cov-fail-under=69
      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: .coverage

  notebook-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install nbformat
        run: pip install nbformat
      - name: Validate notebooks parse correctly
        run: |
          python -c "
          import nbformat, sys, os
          errors = 0
          for root, dirs, files in os.walk('notebooks'):
              for f in files:
                  if f.endswith('.ipynb'):
                      path = os.path.join(root, f)
                      try:
                          nb = nbformat.read(path, as_version=4)
                          print(f'OK: {path} ({len(nb.cells)} cells)')
                      except Exception as e:
                          print(f'FAIL: {path}: {e}')
                          errors += 1
          sys.exit(errors)
          "
      - name: Check notebook sizes
        run: |
          errors=0
          for nb in notebooks/*.ipynb; do
            size=$(stat -c%s "$nb")
            size_mb=$((size / 1048576))
            if [ "$size" -gt 10485760 ]; then
              echo "::error::$nb is ${size_mb}MB (>10MB). Clear outputs before committing."
              errors=$((errors + 1))
            elif [ "$size" -gt 2097152 ]; then
              echo "::warning::$nb is ${size_mb}MB (>2MB). Consider clearing outputs."
            else
              echo "OK: $nb (${size_mb}MB)"
            fi
          done
          exit $errors

  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install nbformat pyyaml
          pip install -e .
      - name: Verify config module has required keys
        run: |
          python -c "
          from dash_shap.config import PAPER_CONFIG
          required = {'M', 'K', 'N_REPS', 'EPSILON', 'DELTA', 'N_TRIALS_SB'}
          missing = required - set(PAPER_CONFIG)
          assert not missing, f'Missing keys in dash_shap.config.PAPER_CONFIG: {missing}'
          print('OK: dash_shap.config.PAPER_CONFIG has all required keys')
          for k, v in PAPER_CONFIG.items():
              print(f'  {k} = {v}')
          "
      - name: Verify no local PAPER_CONFIG in parallel runner
        run: |
          if grep -n "^PAPER_CONFIG\s*=" run_experiments_parallel.py; then
            echo "::error::run_experiments_parallel.py defines PAPER_CONFIG locally — should import from dash_shap.config"
            exit 1
          fi
          echo "OK: no local PAPER_CONFIG definition in parallel runner"
      - name: Check sequential runner has deprecation header
        run: |
          grep -q "DEPRECATED" run_experiments.py && echo "OK: deprecation header present" || (echo "::error::run_experiments.py is missing deprecation header" && exit 1)

  file-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for pkl files
        run: |
          pkl_files=$(git diff --name-only --diff-filter=ACM origin/main...HEAD 2>/dev/null | grep '\.pkl$' || true)
          if [ -n "$pkl_files" ]; then
            echo "::error::Pickle files must not be committed:"
            echo "$pkl_files"
            exit 1
          fi
          echo "No .pkl files found in diff."
      - name: Check for large files
        run: |
          errors=0
          # Check tracked files changed in this PR
          changed=$(git diff --name-only --diff-filter=ACM origin/main...HEAD 2>/dev/null || git ls-files)
          for f in $changed; do
            if [ -f "$f" ]; then
              size=$(stat -c%s "$f")
              if [ "$size" -gt 10485760 ]; then
                echo "::error::$f is $(( size / 1048576 ))MB (>10MB limit)"
                errors=$((errors + 1))
              fi
            fi
          done
          exit $errors

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies and pip-audit
        run: |
          pip install -r requirements.txt
          pip install pip-audit
      - name: Run pip-audit
        run: pip-audit --strict || true

  latex-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install chktex
        run: sudo apt-get update && sudo apt-get install -y chktex
      - name: Lint LaTeX source
        run: |
          # Find the latest draft
          draft=$(ls paper/draft_v*_preprint.tex 2>/dev/null | sort -V | tail -1)
          if [ -z "$draft" ]; then
            draft=$(ls paper/draft_v*.tex 2>/dev/null | sort -V | tail -1)
          fi
          if [ -z "$draft" ]; then
            echo "No LaTeX draft found, skipping."
            exit 0
          fi
          echo "Linting: $draft"
          # Run chktex; warnings are informational, errors fail
          chktex -q "$draft" 2>&1 | head -50 || true

  extensions-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Extensions import smoke test
        run: |
          python -c "
          from dash_shap.extensions import (
              confidence_intervals,
              partial_order,
              robust_certification,
          )
          print('Phase 1 extensions (3/6) imported successfully.')
          "
      - name: Verify unimplemented extensions raise NotImplementedError
        run: |
          python -c "
          from dash_shap import extensions
          for name in ['audit_report', 'causal_flags']:
              try:
                  getattr(extensions, name)
                  raise AssertionError(f'{name} should have raised')
              except NotImplementedError:
                  pass
          print('OK: planned extensions raise NotImplementedError')
          "

  perf-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Performance smoke test
        timeout-minutes: 5
        run: |
          python -c "
          import time
          from dash_shap.core.pipeline import DASHPipeline
          from dash_shap.experiments.synthetic import generate_synthetic_linear

          # Small config for smoke test
          X_train, y_train, X_val, y_val, X_explain, y_explain, X_test, y_test, groups, true_importance, meta = generate_synthetic_linear(N=500, P=10, group_size=5, rho=0.8, seed=42)

          pipe = DASHPipeline(M=10, K=5, epsilon=0.08, delta=0.05, seed=42)

          start = time.time()
          pipe.fit(X_train, y_train, X_val, y_val, X_explain)
          elapsed = time.time() - start

          print(f'Pipeline completed in {elapsed:.1f}s (M=10, K=5, n=500, p=10)')
          if elapsed > 120:
              print(f'::error::Performance regression: pipeline took {elapsed:.1f}s (>120s ceiling)')
              import sys; sys.exit(1)
          else:
              print('Performance OK.')
          "

  result-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e .
      - name: Validate committed result JSONs
        run: |
          python -c "
          import json, sys, os, glob, math
          errors = 0
          ref_config = None
          for path in sorted(glob.glob('results/tables/*.json')):
              if 'frozen' in os.path.basename(path):
                  print(f'SKIP (frozen): {path}')
                  continue
              try:
                  data = json.loads(open(path).read())
              except Exception as e:
                  print(f'FAIL parse {path}: {e}')
                  errors += 1
                  continue
              if '_meta' not in data:
                  print(f'FAIL no _meta: {path}')
                  errors += 1
                  continue
              meta = data['_meta']
              for field in ['experiment', 'timestamp', 'code_sha', 'n_reps', 'paper_config']:
                  if field not in meta:
                      print(f'FAIL _meta missing {field}: {path}')
                      errors += 1
              cfg = meta.get('paper_config')
              if cfg:
                  if ref_config is None:
                      ref_config = cfg
                  elif cfg != ref_config:
                      print(f'FAIL config mismatch vs first seen: {path}')
                      errors += 1
              print(f'OK: {path}')
          sys.exit(errors)
          "

  slow-tests:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
          pip install pytest pytest-cov pytest-timeout
      - name: Run full test suite with coverage
        run: pytest -v --cov=dash_shap --cov-report=term-missing --cov-fail-under=70 --timeout=3600
