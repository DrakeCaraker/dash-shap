[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dash-shap"
version = "0.1.0"
description = "DASH: Diversified Aggregation of SHAP"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
keywords = ["shap", "explainability", "xgboost", "feature-importance", "collinearity"]
authors = [
  {name = "Drake Caraker"},
  {name = "Bryan Arnold"},
  {name = "David Rhoads"},
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
  "numpy>=1.23",
  "scipy>=1.9",
  "scikit-learn>=1.1",
  "xgboost>=1.7",
  "shap>=0.42",
  "joblib>=1.2",
  "matplotlib>=3.5",
  "pandas>=1.5",
]

[project.optional-dependencies]
lightgbm = ["lightgbm>=3.3"]

[project.urls]
Homepage = "https://github.com/DrakeCaraker/dash-shap"
Paper = "https://doi.org/10.5281/zenodo.19060133"

[tool.setuptools.packages.find]
include = ["dash_shap*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::FutureWarning",
]
