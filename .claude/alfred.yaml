# Alfred project configuration — generated by /bootstrap
# Hooks and commands read this instead of hardcoding values.
# Edit anytime; changes take effect on next hook/command run.

project:
  name: "dash-shap"
  type: "python"

formatting:
  tool: "ruff"

testing:
  command: "make test"
  fast_command: "make test-fast"

ci:
  lint_command: "make lint"
  typecheck_command: "make typecheck"
  source_paths: ["dash_shap/", "tests/", "scripts/"]
  source_glob: "*.py"

protected_files:
  - "notebooks/demo_benchmark_6.ipynb"
  - "notebooks/demo_benchmark_7_parallel.ipynb"

blocked_extensions: [".pkl", ".joblib", ".pt", ".pth", ".h5", ".ckpt", ".safetensors"]
max_file_size_mb: 10

git:
  main_branch: "main"

domain:
  venue: "TMLR"
  topic: "explainable AI / feature stability under collinearity"
